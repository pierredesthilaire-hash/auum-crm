<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>auum CRM — Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F3F5F1; --panel:#FFFFFF; --ink:#182420; --muted:#66756D; --line:#E2E7E1;
  --pine:#0E3F30; --pine2:#0A2E23; --teal:#149E7E; --teal-soft:#E1F2EC;
  --amber:#C98A1B; --red:#C24E3A; --blue:#3E6FA8; --violet:#7B5EA7; --sage:#5B8266; --slate:#7C8B9D;
  --radius:12px;
  --disp:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);background:var(--bg);color:var(--ink);font-size:13.5px;display:flex;overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:7px 9px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:0;border-color:var(--teal)}

/* ---------- Sidebar ---------- */
#side{width:212px;min-width:212px;background:linear-gradient(180deg,var(--pine) 0%,var(--pine2) 100%);color:#EAF3EE;display:flex;flex-direction:column;padding:18px 14px}
#side .logo{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:-.5px;color:#fff;padding:2px 8px 0}
#side .logo span{color:#59D2B0}
#side .tagline{font-size:10.5px;color:#8FBCA9;padding:2px 8px 18px;letter-spacing:.4px;text-transform:uppercase}
.navbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:#C9DED3;padding:9px 10px;border-radius:9px;font-size:13.5px;font-weight:500;margin-bottom:2px}
.navbtn:hover{background:rgba(255,255,255,.07);color:#fff}
.navbtn.active{background:rgba(89,210,176,.16);color:#fff;box-shadow:inset 2.5px 0 0 #59D2B0}
.navbtn .ic{width:17px;text-align:center;opacity:.85}
#side .counter{margin-top:auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px 13px 11px}
#side .counter .big{font-family:var(--disp);font-size:29px;font-weight:700;color:#59D2B0;line-height:1}
#side .counter .lbl{font-size:10.5px;color:#9FC5B3;margin-top:4px;line-height:1.4}
#side .foot{font-size:10px;color:#6E9483;padding:12px 8px 0}

/* ---------- Main ---------- */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{display:flex;align-items:center;gap:12px;padding:13px 22px;background:var(--panel);border-bottom:1px solid var(--line)}
#topbar h1{font-family:var(--disp);font-size:17px;font-weight:600}
#topbar .sub{color:var(--muted);font-size:12px}
#gsearch{margin-left:auto;width:250px}
.btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--ink)}
.btn:hover{border-color:var(--teal);color:var(--teal)}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.primary:hover{background:#0F8A6D;color:#fff}
.btn.danger{color:var(--red)}
#content{flex:1;overflow:auto;padding:20px 22px}

/* ---------- Filters ---------- */
.filters{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--pine);border-color:var(--pine);color:#fff}
.chip:hover{border-color:var(--teal)}

/* ---------- KPI cards ---------- */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px}
.kpi .v{font-family:var(--disp);font-size:23px;font-weight:700;letter-spacing:-.5px}
.kpi .l{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.35}
.kpi.accent .v{color:var(--teal)}
.kpi.amber .v{color:var(--amber)}

/* ---------- Panels / grid ---------- */
.grid2{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;margin-bottom:14px}
.grid2b{display:grid;grid-template-columns:.9fr 1.1fr;gap:14px;margin-bottom:14px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.panel h3{font-family:var(--disp);font-size:13.5px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel h3 .hint{font-weight:400;font-size:11px;color:var(--muted);font-family:var(--body)}

/* funnel */
.fun-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.fun-lbl{width:118px;font-size:12px;font-weight:600}
.fun-track{flex:1;background:#F0F3EF;border-radius:6px;height:26px;position:relative}
.fun-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:9px;color:#fff;font-size:11.5px;font-weight:600;min-width:34px;transition:width .5s ease}
.fun-meta{width:150px;font-size:11.5px;color:var(--muted);text-align:right}

/* bars par AE */
.ae-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ae-name{width:130px;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ae-track{flex:1;position:relative;height:22px;background:#F0F3EF;border-radius:6px}
.ae-total{position:absolute;inset:0;border-radius:6px;opacity:.22}
.ae-w{position:absolute;top:0;left:0;bottom:0;border-radius:6px}
.ae-val{width:135px;text-align:right;font-size:11.5px;color:var(--muted)}

/* donut */
.donut-wrap{display:flex;gap:18px;align-items:center}
.legend{flex:1}
.legend .li{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px}
.dot{width:9px;height:9px;border-radius:3px;flex:none}
.legend .li b{margin-left:auto;font-family:var(--disp)}

/* forecast bars */
.fc-wrap{display:flex;align-items:flex-end;gap:7px;height:150px;padding-top:6px}
.fc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.fc-bar{width:100%;max-width:38px;background:var(--teal);border-radius:5px 5px 0 0;position:relative;transition:height .5s}
.fc-bar .tip{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--pine);white-space:nowrap;font-family:var(--disp)}
.fc-lbl{font-size:10px;color:var(--muted);white-space:nowrap}

/* tables */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:left;padding:7px 9px;border-bottom:1px solid var(--line);font-weight:600}
td{padding:8px 9px;border-bottom:1px solid #EEF1ED;vertical-align:middle}
tr.clickable:hover td{background:#F6F9F6;cursor:pointer}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.pill{display:inline-block;padding:2.5px 9px;border-radius:12px;font-size:10.5px;font-weight:700;color:#fff}
.alertbox{border-left:3px solid var(--red);background:#FBF1EF;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12.5px}
.alertbox b{color:var(--red)}

/* ---------- Kanban ---------- */
#kanban{display:flex;gap:12px;align-items:flex-start;min-height:70vh}
.kcol{flex:1;min-width:0;background:#ECEFEA;border-radius:12px;padding:9px;display:flex;flex-direction:column;max-height:calc(100vh - 210px)}
.kcol.dragover{outline:2px dashed var(--teal);outline-offset:-2px}
.khead{display:flex;align-items:center;gap:7px;padding:4px 6px 9px;flex:none}
.khead .kdot{width:9px;height:9px;border-radius:50%}
.khead b{font-size:12.5px;font-family:var(--disp)}
.khead .kcount{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600}
.ksum{font-size:10.5px;color:var(--muted);padding:0 6px 8px;flex:none}
.kcards{overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:4px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 11px;cursor:grab;box-shadow:0 1px 2px rgba(20,40,30,.05)}
.kcard:hover{border-color:var(--teal);box-shadow:0 3px 10px rgba(20,40,30,.08)}
.kcard.dragging{opacity:.45}
.kcard .kc-client{font-weight:700;font-size:12.5px;margin-bottom:2px}
.kcard .kc-name{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kcard .kc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;background:#F0F3EF;color:#4A5852}
.tag.money{background:var(--teal-soft);color:var(--pine)}
.tag.late{background:#F9E8E4;color:var(--red)}
.avatar{width:20px;height:20px;border-radius:50%;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:auto;flex:none}

/* ---------- Drawer ---------- */
#overlay{position:fixed;inset:0;background:rgba(14,35,27,.35);display:none;z-index:40}
#drawer{position:fixed;top:0;right:-560px;width:540px;max-width:94vw;height:100%;background:#fff;z-index:50;box-shadow:-8px 0 30px rgba(10,30,20,.18);transition:right .25s ease;display:flex;flex-direction:column}
#drawer.open{right:0}
#drawer .dhead{padding:18px 22px 14px;border-bottom:1px solid var(--line)}
#drawer .dhead h2{font-family:var(--disp);font-size:17px;line-height:1.3;padding-right:30px}
#drawer .dhead .sub{color:var(--muted);font-size:12px;margin-top:3px}
#dclose{position:absolute;top:14px;right:16px;border:none;background:#F0F3EF;width:30px;height:30px;border-radius:50%;font-size:15px}
#drawer .dbody{flex:1;overflow-y:auto;padding:18px 22px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fld label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%}
.dsec{font-family:var(--disp);font-size:12.5px;font-weight:600;margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--line)}
#drawer .dfoot{padding:13px 22px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end}
.meta-dyn{font-size:11px;color:var(--muted);background:#F6F8F5;border-radius:8px;padding:9px 11px;line-height:1.6}
.act-item{font-size:12px;border-left:2px solid var(--teal);padding:4px 10px;margin-bottom:7px;color:#3A4842}
.act-item .when{color:var(--muted);font-size:10.5px}

/* ---------- Comptes ---------- */
#comptes-layout{display:grid;grid-template-columns:330px 1fr;gap:14px;height:calc(100vh - 165px)}
#acc-list{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow-y:auto;padding:10px}
.acc-group{margin-bottom:4px}
.acc-ghead{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;cursor:pointer;font-weight:700;font-size:12.5px}
.acc-ghead:hover{background:#F2F6F2}
.acc-ghead .chev{font-size:9px;color:var(--muted);transition:transform .15s}
.acc-group.open .chev{transform:rotate(90deg)}
.acc-ghead .gtag{margin-left:auto;font-size:9.5px;background:var(--teal-soft);color:var(--pine);padding:2px 7px;border-radius:9px;font-weight:700}
.acc-children{display:none;padding-left:14px}
.acc-group.open .acc-children{display:block}
.acc-item{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:8px;cursor:pointer;font-size:12.5px}
.acc-item:hover{background:#F2F6F2}
.acc-item.sel{background:var(--teal-soft);font-weight:600}
.acc-item .mini{margin-left:auto;font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
#acc-detail{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow-y:auto;padding:20px}
.acc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
.acc-stat{background:#F6F8F5;border-radius:10px;padding:11px 12px}
.acc-stat .v{font-family:var(--disp);font-size:18px;font-weight:700}
.acc-stat .l{font-size:10.5px;color:var(--muted);margin-top:2px}
.contact-card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;font-size:12.5px}
.contact-card .cinfo{flex:1}
.contact-card .crole{color:var(--muted);font-size:11px}
.empty{color:var(--muted);font-size:12.5px;font-style:italic;padding:6px 0}

/* réglages */
.integ{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.integ .panel h3 .badge{font-size:9.5px;padding:2px 8px;border-radius:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.badge.soon{background:#FFF3DC;color:var(--amber)}
.badge.plan{background:#E8EEF6;color:var(--blue)}
.badge.ok{background:var(--teal-soft);color:var(--pine)}
.integ p{font-size:12.5px;color:#43524B;line-height:1.55;margin-bottom:8px}
.integ code{background:#F2F5F1;padding:1px 6px;border-radius:5px;font-size:11px}

/* funnel d'activité */
.actfun{display:flex;align-items:stretch}
.fstep{flex:1;background:#F6F8F5;border:1px solid var(--line);border-radius:11px;padding:12px 15px}
.fstep .fv{font-family:var(--disp);font-size:24px;font-weight:700}
.fstep .fl{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35}
.fstep .fx{font-size:10.5px;color:#4A5852;margin-top:6px}
.farrow{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 9px;min-width:64px}
.farrow .pct{font-family:var(--disp);font-size:14px;font-weight:700;color:var(--teal)}
.farrow .plbl{font-size:9px;color:var(--muted);text-align:center;line-height:1.3}
.farrow .arr{color:#B9C6BE;font-size:15px}

/* prospection */
.ptoolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.pstats{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.pstat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 14px}
.pstat .v{font-family:var(--disp);font-size:18px;font-weight:700}
.pstat .l{font-size:10.5px;color:var(--muted)}
.spill{display:inline-block;padding:2.5px 9px;border-radius:12px;font-size:10.5px;font-weight:700;color:#fff;border:none;cursor:pointer}
td select.inline{border:none;background:transparent;font-size:12px;padding:2px 3px;font-weight:600;max-width:120px}
.touchbtn{border:1px solid var(--line);background:#fff;border-radius:7px;width:26px;height:26px;font-size:12px;padding:0}
.touchbtn:hover{border-color:var(--teal)}
.tcount{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.demo-flag{font-size:9px;background:#FFF3DC;color:var(--amber);padding:1.5px 6px;border-radius:8px;font-weight:700;vertical-align:middle}

/* journal */
.jrow td{font-size:12px}
.jtype{display:inline-block;padding:2.5px 9px;border-radius:12px;font-size:10px;font-weight:700}
.jt-create{background:#E1F2EC;color:var(--pine)} .jt-stage{background:#E8EEF6;color:var(--blue)}
.jt-field{background:#F0F3EF;color:#4A5852} .jt-won{background:var(--pine);color:#fff}
.jt-lost{background:#F9E8E4;color:var(--red)} .jt-parc{background:#FFF3DC;color:var(--amber)}
.delta-up{color:var(--teal);font-weight:700} .delta-down{color:var(--red);font-weight:700}
/* tâches */
.tsec{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:800;color:var(--muted);margin:13px 0 7px}
.tsec.red{color:var(--red)} .tsec.amber{color:var(--amber)}
.titem{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:10px;padding:8px 11px;margin-bottom:6px;background:#fff}
.titem.over{border-left:3px solid var(--red)} .titem.today{border-left:3px solid var(--amber)}
.titem.done{opacity:.5} .titem .tt{flex:1;min-width:0}
.titem .tt b{font-size:12.5px} .titem .tt .tsub{font-size:10.5px;color:var(--muted);margin-top:1px}
.titem .tdate{font-size:11px;font-weight:700;white-space:nowrap}
.titem .tdate.over{color:var(--red)} .titem .tdate.today{color:var(--amber)}
.tchip{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:9px;background:#F0F3EF;color:#4A5852;white-space:nowrap}
.tchip.auto{background:#E8EEF6;color:var(--blue)}
.tchip.deleg{background:#F3ECFA;color:var(--violet)}
.tsnooze{border:1px solid var(--line);background:#fff;border-radius:6px;font-size:10px;padding:3px 6px;font-weight:700;color:var(--muted)}
.tsnooze:hover{border-color:var(--teal);color:var(--teal)}
/* cartes de tâches */
.tcard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(20,40,30,.04)}
.tcard.over{border-left:4px solid var(--red);background:#FDF6F4}
.tcard.today{border-left:4px solid var(--amber);background:#FFFBF3}
.tcard-top{display:flex;gap:10px}
.tcard-icon{font-size:18px;line-height:1;flex:none;width:24px;text-align:center}
.tcard-body{flex:1;min-width:0}
.tcard-title{font-size:13px;font-weight:700;line-height:1.3}
.tcard-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.tcard-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
.tcard-date{font-size:10.5px;font-weight:700;color:var(--muted)}
.tcard-date.over{color:var(--red)} .tcard-date.today{color:var(--amber)}
.tchip.link{background:var(--teal-soft);color:var(--pine);cursor:pointer}
.tchip.link:hover{background:#CBE9DF}
.tcard-actions{display:flex;gap:6px;margin-top:10px;padding-top:9px;border-top:1px solid #EEF1ED}
.tdone{flex:1;border:1.5px solid var(--teal);background:var(--teal-soft);color:var(--pine);border-radius:8px;padding:6px;font-size:12px;font-weight:700}
.tdone:hover{background:var(--teal);color:#fff}
/* calendrier semaine */
.tweek{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.twcol{background:#F6F8F5;border:1px solid var(--line);border-radius:10px;padding:7px;min-height:120px}
.twcol.twtoday{background:#FFFBF3;border-color:var(--amber)}
.twhead{display:flex;flex-direction:column;align-items:center;padding:2px 0 8px;border-bottom:1px solid var(--line);margin-bottom:8px}
.twhead b{font-size:11px;text-transform:capitalize} .twhead span{font-size:10px;color:var(--muted)}
.twempty{text-align:center;color:#C3CDC6;font-size:13px;padding:14px 0}
.twtask{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px;margin-bottom:6px}
.twtask.over{border-left:3px solid var(--red)}
.twt-title{font-size:10.5px;font-weight:600;line-height:1.3;cursor:pointer;margin-bottom:5px}
.twt-title:hover{color:var(--teal)}
.twt-late{font-size:9px;color:var(--red);font-weight:700;margin-bottom:5px}
.twt-done{width:100%;border:1px solid var(--teal);background:var(--teal-soft);color:var(--pine);border-radius:6px;padding:4px;font-size:10px;font-weight:700}
.twt-done:hover{background:var(--teal);color:#fff}
/* widget dashboard tâches */
.twidget-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #EEF1ED}
.twidget-row:last-child{border-bottom:none}
.twidget-row.over{background:#FDF6F4;border-radius:8px;padding-left:8px} 
.twidget-row.today{background:#FFFBF3;border-radius:8px;padding-left:8px}
.tdone-mini{flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--teal);background:var(--teal-soft);color:var(--pine);font-size:12px;font-weight:700}
.tdone-mini:hover{background:var(--teal);color:#fff}
.tw-body{flex:1;min-width:0;cursor:pointer}
.tw-title{font-size:12.5px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tw-sub{font-size:10.5px;color:var(--muted)}
.tw-date{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.tw-date.over{color:var(--red)} .tw-date.today{color:var(--amber)}
/* RDV du jour */
.meet-row{display:flex;gap:11px;align-items:center;padding:9px 4px;border-bottom:1px solid #EEF1ED;cursor:pointer}
.meet-row:last-child{border-bottom:none}
.meet-row:hover{background:#F6F9F6}
.meet-row.meet-past{opacity:.5}

#onb-card .onb-top{background:linear-gradient(135deg,var(--pine),var(--pine2));padding:22px 26px;color:#fff}
#onb-card .onb-step{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:#8FBCA9;font-weight:700}
#onb-card .onb-emoji{font-size:34px;margin:6px 0 4px}
#onb-card .onb-title{font-family:var(--disp);font-size:20px;font-weight:600}
#onb-card .onb-body{padding:20px 26px 8px;font-size:13.5px;color:#3A4842;line-height:1.6}
#onb-card .onb-body b{color:var(--ink)}
#onb-card .onb-body ul{margin:8px 0 0;padding-left:18px}
#onb-card .onb-body li{margin-bottom:5px}
#onb-card .onb-foot{display:flex;align-items:center;gap:10px;padding:14px 26px 20px}
.onb-dots{display:flex;gap:6px}
.onb-dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
.onb-dot.on{background:var(--teal);width:20px;border-radius:4px}
#onb-skip{margin-left:auto;background:none;border:none;color:var(--muted);font-size:12px;font-weight:600}
#onb-next{background:var(--teal);border:none;color:#fff;border-radius:9px;padding:9px 18px;font-size:13.5px;font-weight:700}
#onb-next:hover{background:#0F8A6D}
.help-fab{position:fixed;bottom:20px;right:20px;z-index:30;width:44px;height:44px;border-radius:50%;background:var(--pine);color:#fff;border:none;font-size:19px;box-shadow:0 6px 18px rgba(10,40,25,.3)}
.help-fab:hover{background:var(--teal)}
/* cartes clients */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.ccard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 15px;cursor:pointer;transition:box-shadow .15s,border-color .15s;display:flex;flex-direction:column;gap:8px}
.ccard:hover{border-color:var(--teal);box-shadow:0 6px 18px rgba(20,60,40,.09)}
.ccard-head{display:flex;align-items:flex-start;gap:9px}
.ccard-name{font-family:var(--disp);font-weight:600;font-size:14.5px;line-height:1.25;flex:1}
.ccard-group{font-size:10px;color:var(--muted);margin-top:1px}
.ccard-stats{display:flex;gap:14px}
.ccard-stat .v{font-family:var(--disp);font-weight:700;font-size:15px}
.ccard-stat .l{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.ccard-news{background:#FFF7E8;border-left:3px solid var(--amber);border-radius:7px;padding:7px 10px;font-size:11px;line-height:1.45;color:#6B5518}
.ccard-news b{color:#8A6410}
.ccard-foot{display:flex;align-items:center;gap:7px;margin-top:auto}
.seg-pill{font-size:9px;font-weight:800;padding:2.5px 8px;border-radius:9px;color:#fff;text-transform:uppercase;letter-spacing:.4px;flex:none}
/* actus */
.news-item{display:flex;gap:11px;padding:10px 4px;border-bottom:1px solid #EEF1ED;align-items:flex-start}
.news-item:last-child{border-bottom:none}
.news-ic{flex:none;width:32px;height:32px;border-radius:9px;background:#FFF3DC;display:flex;align-items:center;justify-content:center;font-size:15px}
.news-body{flex:1;min-width:0}
.news-title{font-size:12.5px;font-weight:700;line-height:1.35}
.news-sugg{font-size:11.5px;color:#6B5518;background:#FFF7E8;border-radius:7px;padding:6px 9px;margin-top:5px;line-height:1.45}
.news-meta{font-size:10px;color:var(--muted);margin-top:3px}
.news-actions{display:flex;gap:6px;margin-top:6px}
/* campagnes */
.camp-ctas{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.camp-cta{background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:16px;cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s}
.camp-cta:hover{border-color:var(--teal);box-shadow:0 6px 18px rgba(20,60,40,.09)}
.camp-cta .ce{font-size:24px}
.camp-cta .ct{font-family:var(--disp);font-weight:600;font-size:14px;margin:6px 0 3px}
.camp-cta .cd{font-size:11px;color:var(--muted);line-height:1.45}
.camp-card{border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;background:#fff}
.camp-funnel{display:flex;gap:14px;margin-top:9px}
.camp-fs .v{font-family:var(--disp);font-weight:700;font-size:16px}
.camp-fs .l{font-size:9.5px;color:var(--muted);text-transform:uppercase}
.seq-step{display:flex;gap:9px;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px dashed #E6EAE5}
.seq-step:last-child{border-bottom:none}
.seq-day{flex:none;font-family:var(--disp);font-weight:700;font-size:10.5px;color:var(--teal);width:34px}
/* mouvements de poste */
.jc-ic{flex:none;width:32px;height:32px;border-radius:9px;background:#F3ECFA;display:flex;align-items:center;justify-content:center;font-size:15px}
.jc-kind{font-size:9px;font-weight:800;padding:2px 8px;border-radius:9px;text-transform:uppercase;letter-spacing:.4px}
.jc-promo{background:#E1F2EC;color:var(--pine)} .jc-arrivee{background:#E8EEF6;color:var(--blue)} .jc-depart{background:#FFF3DC;color:var(--amber)}
.jc-sugg{font-size:11.5px;color:#4A3B63;background:#F6F0FC;border-radius:7px;padding:6px 9px;margin-top:5px;line-height:1.45}
.notif-dot{display:inline-flex;align-items:center;justify-content:center;min-width:19px;height:19px;border-radius:10px;background:var(--red);color:#fff;font-size:10.5px;font-weight:800;padding:0 5px;margin-left:6px}
/* veille secteur */
.sw-item{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid #EEF1ED;font-size:12px;line-height:1.5}
.sw-item:last-child{border-bottom:none}
.sw-dot{flex:none;width:6px;height:6px;border-radius:50%;background:var(--teal);margin-top:6px}
.sw-src{font-size:10px;color:var(--muted);display:block;margin-top:2px}
.meet-time{flex:none;text-align:center;font-family:var(--disp);font-weight:700;font-size:13px;color:var(--pine);line-height:1.1}
.meet-time span{display:block;font-size:10px;color:var(--muted);font-weight:400}
.meet-title{font-size:12.5px;font-weight:600;line-height:1.3}
.meet-sub{font-size:10.5px;color:var(--muted);margin-top:1px}
.state-badge{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:9px;text-transform:uppercase;letter-spacing:.4px}
.state-won{background:var(--pine);color:#fff} .state-lost{background:#F9E8E4;color:var(--red)}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--pine);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,.2);opacity:0;transition:opacity .2s}

S.benchmarks = S.benchmarks || {

  alertRatio:1.5,  /* seuil d'alerte vieillissement : âge > cycle × ratio */
  floor:0.5        /* décote maximale appliquée à la pondération */
};
function srcKey(source){
  const s=(source||'').toLowerCase();
  if(s.includes('outbound')||s.includes('prospection')||s.includes('sdr')) return 'Outbound';
  if(s.includes('marketing')) return 'Marketing';
  if(s.includes('upsell')) return 'Upsell';
  if(s.includes('renouvellement')) return 'Renouvellement';
  return null;
}
function benchOf(o){
  const k=srcKey(o.source);
  return { key:k||'Global', b:(k&&S.benchmarks.sources[k])||S.benchmarks.global };
}
function ageDays(o){
  if(!o.createdOn) return 0;
  return Math.max(0, Math.round((new Date(TODAY)-new Date(o.createdOn))/86400000));
}
function lifecycle(o){
  const {key,b}=benchOf(o);
  const age=ageDays(o), cycle=b.cycle||S.benchmarks.global.cycle;
  const ratio=cycle? age/cycle : 0;
  const fl=S.benchmarks.floor;
  const fresh = ratio<=1 ? 1 : ratio>=2 ? fl : 1-(ratio-1)*(1-fl);
  const probAdj = o.prob*fresh;
  return {key, age, cycle, ratio, fresh, probAdj, wAdj:o.amount*probAdj/100, mAdj:o.machines*probAdj/100,
          histClose:b.close, aging: ratio>S.benchmarks.alertRatio};
}

function buildMonthlyBars(O){
  const months=[]; const d=new Date(TODAY+'T00:00:00'); d.setDate(1);
  for(let i=0;i<12;i++){ const m=new Date(d.getFullYear(),d.getMonth()+i,1); months.push(m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0')); }
  const agg = months.map(m=>({m, v:O.filter(o=>o.closeDate&&o.closeDate.slice(0,7)===m).reduce((s,o)=>s+wAmount(o),0)}));
  const max = Math.max(...agg.map(a=>a.v),1);
  const w = el('div','fc-wrap');
  agg.forEach(a=>{
    const col=el('div','fc-col');
    const bar=el('div','fc-bar'); bar.style.height=Math.max(a.v/max*118,2)+'px';
    if(a.v>0) bar.appendChild(el('span','tip',keur(a.v)));
    const [y,mo]=a.m.split('-');
    col.appendChild(bar); col.appendChild(el('div','fc-lbl',['janv','févr','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'][+mo-1]+' '+y.slice(2)));
    w.appendChild(col);
  });
  return w;
}

/* ================= COMPTES ================= */
function entAEs(e){
  const set = new Set();
  if(e.owner) set.add(e.owner);
  S.opps.forEach(o=>{ if(o.client===e.name && o.state==='open') set.add(o.ae); });
  S.prospects.forEach(p=>{ if(p.societe===e.name && p.ae) set.add(p.ae); });
  return set;
}
function accStats(ent){
  const oo = S.opps.filter(o=>o.client===ent.name && o.state==='open');
  return { n:oo.length, amount:oo.reduce((s,o)=>s+o.amount,0), mach:oo.reduce((s,o)=>s+o.machines,0), w:oo.reduce((s,o)=>s+wAmount(o),0), oo };
}

/* recherche (démo) : liste brute de personas, sans email ni téléphone */
function generateFound(r){
  const found = Math.min(Math.round(r.n*1.25), 40); /* la recherche ramène ~25 % de plus que la cible */
  const pref=['Ateliers','Manufacture','Groupe','Industries','Mécanique','Fonderie','Laboratoires','Plastiques','Technique','Usinage'];
  const suff=['Perrin','du Val','Bertin','Rochas','Delmas','de l\u2019Ouest','Francilienne','Lorin','Savart','Meyer','Prieur','Guyot','Aubry','Chatel','Dumas'];
  const pn=['Julie','Karim','Cécile','Yann','Sonia','Bruno','Léa','Hakim','Muriel','Denis','Alice','Rémi','Nora','Gilles','Éva'];
  const nn=['Petit','Marek','Fontan','Ledoux','Berthier','Nguyen','Salmon','Costa','Rey','Weber','Payet','Lopez','Blin','Morel','Adam'];
  const fnsTarget=(r.fn||'RSE, Services Généraux, QHSE').split(',').map(s=>s.trim()).filter(Boolean);
  const fnsNoise=['Assistant(e) de direction','Comptable','Responsable achats','DRH adjoint'];
  for(let i=0;i<found;i++){
    /* ~1 persona sur 5 est hors cible — c'est précisément ce que l'AE doit écarter */
    const offTarget = (i%5===4);
    const _soc = pref[i%pref.length]+' '+suff[(i*7+3)%suff.length];
    const _ct = pn[i%pn.length]+' '+nn[(i*3+1)%nn.length];
    r.found.push({fid:'F-'+(i+1), societe:_soc, contact:_ct,
      li:'https://www.linkedin.com/in/'+_ct.toLowerCase().replace(/[^a-z ]/g,'').replace(/ /g,'-')+'-'+String(10+((i*13)%89)),
      fonction: offTarget? fnsNoise[i%fnsNoise.length] : fnsTarget[i%fnsTarget.length],
      ville:r.loc||'—', secteur:r.naf||'Ciblage '+r.id,
      dupe: i%9===8, /* détection doublon base CRM (démo) */
      keep: !(i%5===4) && !(i%9===8), offTarget});
  }
}

function logTouch(p, type){
  p.touches = p.touches||[];
  p.touches.unshift({type, when:TODAY});
  if(p.status==='a_contacter') p.status='contacte';
  toast('Contact '+(type==='email'?'email':'téléphone')+' tracé — '+p.societe);
}
function setPStatus(p, status){
  p.status=status;
  if(status==='converti' && !p.oppId) convertProspect(p, true);
}
function convertProspect(p, silent){
  const nid = 'OP-'+String(S.opps.length+1).padStart(3,'0');
  /* entité : créer si absente */
  let ent = entByName[p.societe];
  if(!ent){
    ent = {id:'E-'+String(S.entities.length+1).padStart(3,'0'), name:p.societe, groupId:null, parc:0, parcNote:'', contacts:[], siret:'', sector:p.secteur||''};
    S.entities.push(ent); entByName[p.societe]=ent;
  }
  if(p.contact && !ent.contacts.some(x=>x.nom===p.contact))
    ent.contacts.push({nom:p.contact, role:p.fonction||'', email:p.email||'', tel:p.tel||''});
  const o = {id:nid, dynId:'', name:p.societe+' — opportunité issue de prospection', client:p.societe,
    ae:p.ae||AES[0], machines:1, prob:20, stage:'qualification', phaseOrig:'Créée depuis la prospection',
    source:'Outbound/Prospection', closeDate:null, installDate:null, createdOn:TODAY, amount:7400,
    state:'open',
    notes:p.contact?('Contact : '+p.contact+(p.fonction?' ('+p.fonction+')':'')+(p.email?' · '+p.email:'')+(p.tel?' · '+p.tel:'')):'',
    activities:[{when:TODAY, txt:'Opportunité créée depuis le prospect '+p.societe}]};
  S.opps.push(o);
  logEvent('opp_created', o, 'Créée depuis la prospection · '+p.societe, {machines:o.machines, amount:o.amount});
  p.status='converti'; p.oppId=nid;
  if(!silent){ toast('Opportunité créée : '+p.societe); render(); openOpp(nid); }
}

/* ---- import prospects (xlsx / csv) ---- */
function importProspects(file){
  if(!file) return;
  const finish = rows => {
    if(!rows.length){ toast('Aucune ligne exploitable'); return; }
    const H = Object.keys(rows[0]).map(h=>h.toLowerCase());
    const find = keys => { const i = H.findIndex(h=>keys.some(k=>h.includes(k))); return i>=0 ? Object.keys(rows[0])[i] : null; };
    const M = {
      societe: find(['societe','société','entreprise','company','raison','denomination','dénomination','account','compte']),
      contact: find(['contact','nom complet','full name','prenom','prénom','nom']),
      fonction: find(['fonction','titre','poste','job','role','rôle']),
      email: find(['mail']),
      tel: find(['tel','tél','phone','portable','mobile']),
      ville: find(['ville','city','commune']),
      secteur: find(['secteur','naf','ape','activite','activité','industry']),
      ae: find(['ae','commercial','owner','proprietaire','propriétaire','attribu']),
      linkedin: find(['linkedin','profil','profile url','lien li']),
    };
    if(!M.societe){ toast('Colonne société introuvable — vérifiez les entêtes'); return; }
    let n=0;
    rows.forEach(r=>{
      const soc = String(r[M.societe]||'').trim(); if(!soc) return;
      const aeRaw = M.ae? String(r[M.ae]||'').trim() : '';
      const ae = AES.find(a=>a.toLowerCase().includes(aeRaw.toLowerCase()) && aeRaw) || null;
      S.prospects.push({
        id:'P-'+String(S.prospects.length+1).padStart(4,'0'), societe:soc,
        contact:M.contact?String(r[M.contact]||'').trim():'', fonction:M.fonction?String(r[M.fonction]||'').trim():'',
        email:M.email?String(r[M.email]||'').trim():'', tel:M.tel?String(r[M.tel]||'').trim():'',
        ville:M.ville?String(r[M.ville]||'').trim():'', secteur:M.secteur?String(r[M.secteur]||'').trim():'',
        linkedin:M.linkedin?String(r[M.linkedin]||'').trim():'',
        ae, status:'a_contacter', touches:[], source:'Import '+file.name, createdOn:TODAY
      }); n++;
    });
    toast(n+' prospects importés'+(M.ae?'':' — non affectés, utilisez la répartition automatique')); render();
  };
  const rd = new FileReader();
  if(/\.csv$/i.test(file.name)){
    rd.onload=()=>{ finish(parseCSV(rd.result)); };
    rd.readAsText(file,'utf-8');
  } else if(typeof XLSX!=='undefined'){
    rd.onload=()=>{ const wb=XLSX.read(new Uint8Array(rd.result),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      finish(XLSX.utils.sheet_to_json(ws,{defval:''})); };
    rd.readAsArrayBuffer(file);
  } else { toast('Lecteur Excel indisponible — utilisez un export CSV'); }
}
function parseCSV(txt){
  const sep = (txt.split('\n')[0].match(/;/g)||[]).length > (txt.split('\n')[0].match(/,/g)||[]).length ? ';' : ',';
  const lines = txt.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(lines.length<2) return [];
  const split = l => { const out=[]; let cur='',q=false;
    for(const ch of l){ if(ch==='"'){q=!q;} else if(ch===sep&&!q){out.push(cur);cur='';} else cur+=ch; }
    out.push(cur); return out.map(s=>s.trim()); };
  const head = split(lines[0]);
  return lines.slice(1).map(l=>{ const v=split(l); const o={}; head.forEach((h,i)=>o[h]=v[i]??''); return o; });
}

function openCampaignWizard(type, ae){
  const t = SEQ_TEMPLATES[type];
  const mine = S.prospects.filter(p=>(canSeeAll()||p.ae===ae) && p.email && !p.seq && p.status!=='converti' && p.status!=='sans_suite');
  const selCount = [...obSel].filter(id=>mine.some(p=>p.id===id)).length;
  const d=$('#drawer'), ov=$('#overlay');
  d.innerHTML = `
    <div class="dhead" style="position:relative">
      <button id="dclose">✕</button>
      <div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700">${t.icon} Nouvelle campagne</div>
      <h2>${t.name}</h2>
      <div class="sub">${t.desc}</div>
    </div>
    <div class="dbody">
      <div class="fld" style="margin-bottom:12px"><label>Nom de la campagne</label>
        <input id="cw-name" placeholder="ex. Plasturgie 77 — juillet" value=""></div>
      <div class="fld" style="margin-bottom:12px"><label>Cible</label>
        <label style="display:flex;gap:8px;align-items:center;font-size:12.5px;margin-bottom:6px">
          <input type="radio" name="cw-target" value="sel" ${selCount?'checked':'disabled'}> Les ${selCount} prospect(s) sélectionné(s) dans la liste</label>
        <label style="display:flex;gap:8px;align-items:center;font-size:12.5px">
          <input type="radio" name="cw-target" value="all" ${selCount?'':'checked'}> Tous les prospects enrichis disponibles (${mine.length})</label></div>
      <div class="dsec">Séquence</div>
      ${t.steps.map(([d2,s])=>`<div class="seq-step"><span class="seq-day">${d2}</span><span>${s}</span></div>`).join('')}
      <div class="meta-dyn" style="margin-top:14px">En production : la campagne est créée dans <b>Emelia</b> (ou Lemlist) via API avec ces prospects, les messages sont personnalisés par variables (prénom, société, signal d\u2019actualité), et chaque événement (ouverture, réponse, RDV) redescend en temps réel dans le CRM — statut du prospect mis à jour, touche comptée au funnel, tâche créée si réponse positive.</div>
    </div>
    <div class="dfoot"><button class="btn primary" id="cw-go">${t.icon} Lancer la campagne (démo)</button></div>`;
  ov.style.display='block'; d.classList.add('open');
  const close=()=>{d.classList.remove('open');ov.style.display='none';};
  $('#dclose').onclick=close; ov.onclick=close;
  $('#cw-go').onclick=()=>{
    const name = $('#cw-name').value.trim() || t.name+' — '+fdate(TODAY);
    const target = document.querySelector('input[name=cw-target]:checked').value;
    const targets = target==='sel' ? mine.filter(p=>obSel.has(p.id)) : mine;
    if(!targets.length){ toast('Aucun prospect ciblé'); return; }
    /* stats simulées plausibles */
    const sent=targets.length;
    const opened=Math.round(sent*(type==='linkedin'?0.62:0.55));
    const replied=Math.max(1,Math.round(sent*(type==='multi'?0.16:type==='linkedin'?0.11:0.08)));
    const rdv=Math.max(0,Math.round(replied*0.35));
    const cp={id:'C-'+String(S.campaigns.length+1).padStart(3,'0'), name, type, ae, createdOn:TODAY,
      prospects:targets.map(p=>p.id), stats:{sent,opened,replied,rdv}, demo:true};
    S.campaigns.unshift(cp);
    targets.forEach(p=>{ p.seq=name; if(type!=='linkedin'){ p.touches=p.touches||[]; p.touches.unshift({type:'email',when:TODAY}); }
      else { p.touches=p.touches||[]; p.touches.unshift({type:'linkedin',when:TODAY}); }
      if(p.status==='a_contacter') p.status='contacte'; });
    obSel.clear();
    logEvent('outbound', null, 'Campagne '+cp.id+' « '+name+' » ('+t.name+') lancée par '+ae.split(' ')[0]+' — '+sent+' prospects');
    close(); toast('🚀 Campagne lancée sur '+sent+' prospects (démo)'); render();
  };
}

/* ================= TÂCHES ================= */
let taskView = 'list';
function renderTaskCenter(c, ae){
  const p = el('div','panel'); p.style.marginBottom='14px';
  const T = S.tasks.filter(t=>t.owner===ae && t.status==='open').sort((a,b)=>(a.due||'9999').localeCompare(b.due||'9999'));
  const done7 = S.tasks.filter(t=>t.owner===ae && t.status==='done' && t.doneOn && t.doneOn>=dateAdd(TODAY,-7));
  const over = T.filter(t=>t.due&&t.due<TODAY).length, todayN = T.filter(t=>t.due===TODAY).length;
  const h = el('h3','','📋 Mes tâches');
  const hint = el('span','hint'); hint.style.marginLeft='8px';
  hint.innerHTML = over?`<span style="color:var(--red);font-weight:700">${over} en retard</span> · `:'';
  hint.innerHTML += `${todayN} aujourd\u2019hui · ${T.length} au total · ${done7.length} faite(s) sur 7 j`;
  h.appendChild(hint);
  const seg = el('div',''); seg.style.cssText='margin-left:auto;display:flex;gap:6px';
  [['list','☰ Liste'],['cal','▦ Semaine']].forEach(([k,l])=>{
    const b=el('button','chip'+(taskView===k?' on':''),l); b.style.fontSize='11.5px';
    b.onclick=()=>{taskView=k;render();}; seg.appendChild(b);
  });
  const bNew = el('button','btn primary','＋ Tâche'); bNew.style.fontSize='11.5px'; bNew.style.padding='5px 11px';
  bNew.onclick=()=>openNewTask({owner:ae}); seg.appendChild(bNew);
  h.appendChild(seg); p.appendChild(h);

  if(!T.length && !done7.length){ p.appendChild(el('div','empty','Aucune tâche. Créez-en une, ou laissez les règles de pipe vous en proposer.')); c.appendChild(p); return; }
  if(taskView==='cal') renderTaskWeek(p, ae, T);
  else renderTaskList(p, T);
  c.appendChild(p);
}
function renderTaskList(p, T){
  const week = dateAdd(TODAY,7);
  const secs = [
    ['En retard','red', t=>t.due && t.due<TODAY],
    ['Aujourd\u2019hui','amber', t=>t.due===TODAY],
    ['Cette semaine','', t=>t.due && t.due>TODAY && t.due<=week],
    ['Plus tard / sans échéance','', t=>!t.due || t.due>week],
  ];
  const used = new Set();
  const grid = el('div'); grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px';
  secs.forEach(([lbl,cls,fn])=>{
    const tt = T.filter(t=>!used.has(t.id) && fn(t)); tt.forEach(t=>used.add(t.id));
    if(!tt.length) return;
    const col = el('div','');
    col.appendChild(el('div','tsec '+cls, lbl+' ('+tt.length+')'));
    tt.forEach(t=>col.appendChild(taskCard(t)));
    grid.appendChild(col);
  });
  p.appendChild(grid);
}
function taskCard(t){
  const o = t.oppId ? S.opps.find(x=>x.id===t.oppId) : null;
  const pr = t.prospectId ? S.prospects.find(x=>x.id===t.prospectId) : null;
  const over = t.due && t.due<TODAY, today = t.due===TODAY;
  const typeIcon = {'Rappel client':'📞','Envoyer le devis':'📄','Relance':'🔔','Préparer démo':'🛠','Administratif':'📋','Autre':'•'}[t.type]||'•';
  const card = el('div','tcard'+(over?' over':today?' today':''));
  card.innerHTML = `
    <div class="tcard-top">
      <span class="tcard-icon">${t.auto?'⚙':typeIcon}</span>
      <div class="tcard-body">
        <div class="tcard-title">${esc(t.title)}</div>
        <div class="tcard-sub">${t.note?esc(t.note):''}</div>
        <div class="tcard-tags">
          <span class="tcard-date ${over?'over':today?'today':''}">${t.due?(over?'⏰ ':today?'📅 ':'')+fdate(t.due):'sans échéance'}</span>
          ${t.auto?'<span class="tchip auto">auto</span>':`<span class="tchip">${esc(t.type)}</span>`}
          ${t.createdBy&&t.createdBy!==t.owner&&!t.auto?'<span class="tchip deleg">confiée par '+esc(t.createdBy.split(' ')[0])+'</span>':''}
          ${o?`<span class="tchip link" data-opp="${o.id}">${esc(o.client)} ↗</span>`:pr?`<span class="tchip link" data-pr="${pr.id}">${esc(pr.societe)} ↗</span>`:''}
        </div>
      </div>
    </div>
    <div class="tcard-actions">
      <button class="tdone" title="Marquer terminée">✓ Fait</button>
      <button class="tsnooze" data-snooze="1">+1j</button>
      <button class="tsnooze" data-snooze="7">+7j</button>
    </div>`;
  card.querySelector('.tdone').onclick=()=>{ t.status='done'; t.doneOn=TODAY; logEvent('task', o, 'Tâche terminée : '+t.title); toast('✓ Tâche terminée'); render(); };
  card.querySelectorAll('[data-snooze]').forEach(b=>b.onclick=()=>{ t.due=dateAdd(t.due||TODAY,+b.dataset.snooze); toast('Reportée au '+fdate(t.due)); render(); });
  const lo=card.querySelector('[data-opp]'); if(lo) lo.onclick=()=>openOpp(lo.dataset.opp);
  const lp=card.querySelector('[data-pr]'); if(lp) lp.onclick=()=>openProspect(lp.dataset.pr);
  return card;
}
function renderTaskWeek(p, ae, T){
  const days=[]; for(let i=0;i<7;i++) days.push(dateAdd(TODAY,i));
  const grid = el('div','tweek');
  const dow=['dim','lun','mar','mer','jeu','ven','sam'];
  days.forEach((d,i)=>{
    const col = el('div','twcol'+(d===TODAY?' twtoday':''));
    const dt=new Date(d+'T00:00:00');
    col.appendChild(el('div','twhead',`<b>${i===0?'Auj.':dow[dt.getDay()]}</b><span>${dt.getDate()}/${dt.getMonth()+1}</span>`));
    const tt = T.filter(t=>t.due===d || (i===0 && t.due && t.due<TODAY));
    if(!tt.length) col.appendChild(el('div','twempty','—'));
    tt.forEach(t=>{
      const o=t.oppId?S.opps.find(x=>x.id===t.oppId):null;
      const over=t.due<TODAY;
      const mini=el('div','twtask'+(over?' over':''));
      mini.innerHTML=`<div class="twt-title">${t.auto?'⚙ ':''}${esc(t.title)}</div>${over?'<div class="twt-late">en retard</div>':''}<button class="twt-done">✓ Fait</button>`;
      mini.querySelector('.twt-done').onclick=()=>{ t.status='done'; t.doneOn=TODAY; logEvent('task', o, 'Tâche terminée : '+t.title); toast('✓ Terminée'); render(); };
      mini.querySelector('.twt-title').onclick=()=>{ if(o)openOpp(o.id); };
      col.appendChild(mini);
    });
    grid.appendChild(col);
  });
  p.appendChild(grid);
  const later = T.filter(t=>!t.due || t.due>dateAdd(TODAY,6));
  if(later.length){ p.appendChild(el('div','',`<div class="tsec" style="margin-top:14px">Au-delà de 7 jours / sans échéance (${later.length})</div>`));
    const g=el('div'); g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px'; later.forEach(t=>g.appendChild(taskCard(t))); p.appendChild(g); }
}

let onbIdx = 0;
const onbSeen = {};  // en session
function startOnboarding(){
  onbIdx=0; $('#onb-ov').style.display='flex'; paintOnb();
}
function paintOnb(){
  const s=ONB_STEPS[onbIdx];
  $('#onb-step').textContent='Étape '+(onbIdx+1)+' / '+ONB_STEPS.length;
  $('#onb-emoji').textContent=s.emoji; $('#onb-title').textContent=s.title; $('#onb-text').innerHTML=s.text;
  $('#onb-next').textContent = onbIdx===ONB_STEPS.length-1 ? 'C\u2019est parti !' : 'Suivant';
  const dots=$('#onb-dots'); dots.innerHTML='';
  ONB_STEPS.forEach((_,i)=>{ const d=document.createElement('div'); d.className='onb-dot'+(i===onbIdx?' on':''); dots.appendChild(d); });
}
function closeOnb(){ $('#onb-ov').style.display='none'; }
$('#onb-next').onclick=()=>{ if(onbIdx<ONB_STEPS.length-1){ onbIdx++; paintOnb(); } else closeOnb(); };
$('#onb-skip').onclick=closeOnb;
$('#help-fab').onclick=startOnboarding;

/* ---- connexion ---- */
function applyRole(){
  const nav = canSeeAll() ? 'nav-dir' : 'nav-ae';
  $('#nav-ae').style.display = canSeeAll() ? 'none' : '';
  $('#nav-dir').style.display = canSeeAll() ? '' : 'none';
  const w=$('#who');
  if(canSeeAll()){
    w.disabled=false;
    w.innerHTML = AES.map(a=>`<option ${a===currentUser?'selected':''}>${esc(a)}</option>`).join('');
    w.onchange=()=>{ currentUser=w.value; toast('Utilisateur actif : '+currentUser); render(); };
    view='cockpit';
  } else {
    w.disabled=true; w.innerHTML = `<option>${esc(currentUser)}</option>`;
    myAE=currentUser; view='dashboard';
  }
  document.querySelectorAll('.navbtn').forEach(x=>x.classList.toggle('active',x.dataset.view===view));
}
function doLogin(){
  const id=$('#lg-id').value.trim().toLowerCase(), pw=$('#lg-pw').value;
  const acc=ACCOUNTS[id];
  if(!acc || acc.pw!==pw){ $('#lg-err').textContent='Identifiant ou mot de passe incorrect.'; return; }
  currentUser=acc.name; sessionRole=acc.role;
  $('#login').style.display='none';
  applyRole(); render();
  // onboarding au premier login d'un AE dans la session
  if(!canSeeAll() && !onbSeen[currentUser]){ onbSeen[currentUser]=true; setTimeout(startOnboarding,300); }
  // bouton d'aide flottant pour les AE
  $('#help-fab').style.display = canSeeAll() ? 'none' : '';
}
$('#lg-go').onclick=doLogin;
$('#lg-pw').addEventListener('keydown',e=>{ if(e.key==='Enter')doLogin(); });
$('#lg-id').addEventListener('keydown',e=>{ if(e.key==='Enter')$('#lg-pw').focus(); });
$('#lg-hint').innerHTML = 'Prototype — identifiants de démonstration (mot de passe <b>auum</b> pour tous) :<br>'+
  '<b>psaint</b> · direction (voit tout) — <b>lconsigny</b>, <b>mespiard</b>, <b>wernault</b>, <b>scustos</b> · AE (voient leur périmètre)';
</script>
